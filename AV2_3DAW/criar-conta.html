<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>Criar Conta</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
    <main class="conteudo">
        <form class="form-cadastro" id="form-cadastro">
            <div class="linha">
                <div class="campo"><label>Telefone:</label><input type="text" name="telefone" required></div>
                <div class="campo"><label>CPF/CNPJ:</label><input type="text" name="cpf" required></div>
            </div>
            <div class="linha"><div class="campo"><label>Email:</label><input type="email" name="email" required></div></div>
            <div class="linha"><div class="campo"><label>Senha:</label><input type="password" name="senha" required></div></div>
            <div class="linha"><div class="campo"><label>Confirmar senha:</label><input type="password" name="confirmar" required></div></div>
            <div class="botoes">
                <button type="submit" class="btn">Criar Conta</button>
                <a href="login.html" class="btn">Retornar</a>
            </div>
        </form>
        <p class="erro" id="erro" style="display:none"></p>
    </main>
    <script src="js/comum.js"></script>
    <script src="js/api.js"></script>
    <script>
        montarTopo({ titulo: 'Criar Conta' });

        document.getElementById('form-cadastro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const { status, json } = await chamarApi('api/criar-conta.php', {
                telefone: fd.get('telefone'), cpf: fd.get('cpf'),
                email: fd.get('email'), senha: fd.get('senha'), confirmar: fd.get('confirmar')
            });
            if (status === 200 && json.ok) {
                location.href = 'menu.html';
            } else {
                const map = {
                    campos_obrigatorios: 'Preencha todos os campos',
                    senhas_diferentes: 'As senhas não são iguais',
                    email_ja_cadastrado: 'Esse email já está cadastrado'
                };
                const erro = document.getElementById('erro');
                erro.textContent = map[json.erro] || 'Erro ao criar conta';
                erro.style.display = 'block';
            }
        });
    </script>
</body>
</html>
