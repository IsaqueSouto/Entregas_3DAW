<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>Cartão</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
    <main class="conteudo">
        <form class="form-cartao" id="form-cartao">
            <div class="linha">
                <div class="campo"><label>Número do Cartão:</label><input type="text" name="numero" maxlength="19" required></div>
            </div>
            <div class="linha">
                <div class="campo"><label>Nome no Cartão:</label><input type="text" name="nome" required></div>
            </div>
            <div class="linha">
                <div class="campo"><label>Validade:</label><input type="text" name="validade" placeholder="MM/AA" required></div>
                <div class="campo"><label>CVV:</label><input type="text" name="cvv" maxlength="4" required></div>
            </div>
            <div class="botoes">
                <a href="pagamento.html" class="btn">Retornar</a>
                <button type="submit" class="btn">Concluir</button>
            </div>
        </form>
    </main>
    <script src="js/comum.js"></script>
    <script src="js/api.js"></script>
    <script>
        (async () => {
            if (!(await exigirLogin())) return;
            montarTopo({ titulo: 'Cartão', mostrarSair: true });
        })();

        document.getElementById('form-cartao').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { json } = await chamarApi('api/pagar.php', { forma: 'cartao' });
            if (json.ok) location.href = 'concluido.html';
        });
    </script>
</body>
</html>
