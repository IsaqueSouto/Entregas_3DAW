<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>Serviços do Dia</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
    <main class="conteudo">
        <div class="faixa-valor" id="subtitulo"></div>
        <div class="horarios" id="servicos"></div>
    </main>
    <script src="js/comum.js"></script>
    <script src="js/api.js"></script>
    <script>
        (async () => {
            if (!(await exigirLogin())) return;
            montarTopo({ titulo: 'Serviços do Dia', mostrarSair: true });

            const params = new URLSearchParams(location.search);
            const dia = params.get('dia') || '';
            const diaSemana = params.get('dia_semana') || '';

            document.getElementById('subtitulo').textContent =
                `${dia} — ${diaSemana}`;

            const { json } = await chamarApi(
                'api/mensal-servicos.php?dia_semana=' + encodeURIComponent(diaSemana)
            );
            if (!json.ok) return;

            const cont = document.getElementById('servicos');
            cont.innerHTML = json.servicos.map(s => {
                const q = 'mensal=1'
                    + '&dia=' + encodeURIComponent(dia)
                    + '&servico=' + encodeURIComponent(s);
                return `<a class="horario" href="horarios.html?${q}">${s}</a>`;
            }).join('');
        })();
    </script>
</body>
</html>
