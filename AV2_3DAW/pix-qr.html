<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>Pix - QR Code</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
    <main class="conteudo">
        <div class="caixa-qr">
            <p>Leia o Código QR:</p>
            <img id="qr" alt="QR Code">
            <div class="botoes" style="justify-content:center;margin-top:18px;">
                <button type="button" class="btn" id="concluir">Concluir</button>
            </div>
        </div>
    </main>
    <script src="js/comum.js"></script>
    <script src="js/api.js"></script>
    <script>
        (async () => {
            if (!(await exigirLogin())) return;
            montarTopo({ titulo: 'Pix - QR Code', mostrarSair: true });
            const { json } = await chamarApi('api/pix-qr.php');
            if (json.ok) document.getElementById('qr').src = json.qr;
        })();

        document.getElementById('concluir').addEventListener('click', async () => {
            const { json } = await chamarApi('api/pagar.php', { forma: 'pix' });
            if (json.ok) location.href = 'concluido.html';
        });
    </script>
</body>
</html>
