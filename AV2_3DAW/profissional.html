<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>Agenda do Profissional</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
    <main class="conteudo">
        <div class="dias" id="dias"></div>
    </main>
    <script src="js/comum.js"></script>
    <script src="js/api.js"></script>
    <script>
        (async () => {
            if (!(await exigirLogin())) return;
            montarTopo({ titulo: 'Agenda do Profissional', mostrarSair: true });
            const id = new URLSearchParams(location.search).get('id') || '';
            const { json } = await chamarApi('api/profissional.php?id=' + encodeURIComponent(id));
            const cont = document.getElementById('dias');
            if (!json.ok) { cont.innerHTML = '<p>Profissional não encontrado</p>'; return; }
            cont.innerHTML = json.dias.map(d => {
                const link = `horarios.html?prof=${encodeURIComponent(id)}&dia=${encodeURIComponent(d.dia)}&servico=${encodeURIComponent(d.servico)}`;
                return `<div class="item">
                    <a href="${link}" class="card">${d.dia}<br>${d.horario}</a>
                    <small>${d.servico}</small>
                </div>`;
            }).join('');
        })();
    </script>
</body>
</html>
